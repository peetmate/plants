<title>Orchid Collection — Nairobi</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #222; padding: 16px; }
  h1 { font-size: 1.4em; margin-bottom: 4px; color: #2d4a1e; }
  .subtitle { font-size: 0.85em; color: #666; margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.12); }
  .img-wrap { width: 100%; height: 220px; background: #f0ede8; position: relative; display: flex; align-items: center; justify-content: center; }
  .img-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .no-img { font-size: 3em; color: #bbb; }
  .ph-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,.35); color: #fff; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 1em; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .ph-nav:hover { background: rgba(0,0,0,.55); }
  .ph-prev { left: 6px; } .ph-next { right: 6px; }
  .ph-meta { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,.55)); color: #fff; font-size: 0.7em; padding: 14px 8px 5px; display: flex; justify-content: space-between; }
  .info { padding: 10px 12px 12px; }
  .uidline { font-size: 0.72em; font-weight: 700; color: #888; letter-spacing: .05em; text-transform: uppercase; margin-bottom: 3px; display: flex; justify-content: space-between; }
  .name { font-size: 0.9em; font-style: italic; font-weight: 600; margin-bottom: 8px; line-height: 1.35; }
  .badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .badge { font-size: 0.68em; font-weight: 600; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
  .badge.temp { background: #d5f5e3; color: #1d6a39; }
  .badge.light { background: #fef9e7; color: #7d6608; }
  .badge.hGood { background: #d5f5e3; color: #1d6a39; }
  .badge.hAverage { background: #fef9e7; color: #7d6608; }
  .badge.hEstablishing, .badge.hEstablishingRecovering { background: #d0eaf7; color: #1a5276; }
  .badge.hRecovering { background: #e8daef; color: #4a235a; }
  .badge.hPoor { background: #fadbd8; color: #78281f; }
  .badge.hOther { background: #f0f0f0; color: #777; }
  .badge.lblNone { background: #fdecea; color: #922b21; }
  .badge.lblRepl { background: #fef5e7; color: #9c640c; }
  .locpill { display: inline-block; font-size: 0.7em; font-weight: 600; background: #eef2e6; color: #2d4a1e; border: 1px solid #cdd8bd; padding: 3px 9px; border-radius: 20px; margin-bottom: 8px; }
  details { font-size: 0.75em; color: #444; }
  details summary { cursor: pointer; font-weight: 600; color: #2d4a1e; outline: none; }
  details table { width: 100%; margin-top: 6px; border-collapse: collapse; }
  details td { padding: 2px 4px; vertical-align: top; border-top: 1px solid #f0f0ec; }
  details td:first-child { font-weight: 600; color: #777; white-space: nowrap; width: 1%; }
  #filters, #past-filters { margin-bottom: 14px; display: flex; flex-direction: column; gap: 8px; }
  .empty { font-size: 0.9em; color: #888; padding: 24px 4px; }
  .filter-group { display: flex; flex-wrap: wrap; align-items: center; gap: 5px; }
  .filter-label { font-size: 0.75em; font-weight: 700; color: #666; min-width: 56px; }
  .fbtn { font-size: 0.72em; font-weight: 600; padding: 7px 13px; min-height: 34px; border-radius: 20px; border: 1.5px solid #ccc; background: #fff; color: #555; cursor: pointer; transition: all .15s; }
  .fbtn.active { background: #2d4a1e; border-color: #2d4a1e; color: #fff; }
  select, #search { font-size: 0.8em; padding: 7px 10px; border-radius: 8px; border: 1.5px solid #ccc; background: #fff; color: #444; }
  #search { width: 230px; }
  #count, #past-count { font-size: 0.8em; color: #666; margin-bottom: 10px; }
  #tabs { display: flex; gap: 6px; margin: 4px 0 16px; border-bottom: 2px solid #e0ddd5; }
  .tab { font-size: 0.95em; font-weight: 600; padding: 9px 18px; border: none; background: none; color: #777; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; }
  .tab.active { color: #2d4a1e; border-bottom-color: #2d4a1e; }
  .loc-card, .past-card { background: #fff; border-radius: 10px; border: 0.5px solid #e0ddd5; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .loc-card h3 { font-size: 1.05em; color: #2d4a1e; margin-bottom: 2px; }
  .loc-card .lc-count { font-size: 0.78em; color: #888; font-weight: 600; }
  .loc-card .lc-desc { font-size: 0.83em; color: #444; line-height: 1.45; margin: 8px 0; }
  .loc-card .lc-stats { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 4px; }
  .loc-card .stat { font-size: 0.72em; padding: 4px 9px; border-radius: 8px; background: #f0ede8; color: #444; }
  .loc-card .stat b { color: #222; }
  .loc-card .lc-lcat { color: #8a6d00; font-weight: 600; }
  .loc-card .lc-light { display: flex; flex-direction: column; margin: 2px 0 6px; }
  .loc-card .lc-lspot { display: flex; justify-content: space-between; gap: 10px; font-size: 0.74em; color: #555; padding: 3px 0; border-bottom: 1px dotted #eee; }
  .loc-card .lc-lspot:last-child { border-bottom: none; }
  .loc-card .lc-lspot b { color: #222; white-space: nowrap; }
  .loc-card .lc-light-none { font-size: 0.74em; color: #999; margin: 6px 0; }
  .loc-card .lc-link { font-size: 0.8em; color: #2d4a1e; cursor: pointer; font-weight: 600; }
  .loc-card .lc-link-off { color: #aaa; cursor: default; font-weight: 500; font-style: italic; }
  .loc-card.loc-empty { background: #fbfaf7; border-style: dashed; }
  .loc-card .lc-strip-lbl, .cd-panel .cd-h { font-size: 0.72em; color: #888; margin: 8px 0 1px; }
  .loc-card .lc-actions { display: flex; gap: 14px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
  .cd-chip { font-size: 0.78em; padding: 4px 11px; border-radius: 20px; background: #eef2e6; color: #2d4a1e; border: 1px solid #cdd8bd; cursor: pointer; font-weight: 600; }
  .cd-panel { margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; }
  .cd-panel .cd-note { font-size: 0.74em; color: #555; margin-top: 2px; }
  .cd-panel .cd-note b { color: #222; }
  .cd-tog { display: flex; gap: 6px; margin: 8px 0 4px; }
  .cd-tog .cd-chip { background: #f0ede8; border: 1px solid #ddd9cf; color: #666; }
  .cd-tog .cd-chip.on { background: #2d4a1e; border-color: #2d4a1e; color: #fff; }
  .cd-chartwrap { position: relative; }
  .cd-tip { display: none; position: absolute; top: 0; font-size: 0.72em; background: #2c2c2a; color: #fff; padding: 3px 8px; border-radius: 6px; white-space: nowrap; pointer-events: none; z-index: 5; }
  .cd-tip b { color: #fff; }
  .cd-leg { display: flex; flex-wrap: wrap; gap: 10px; font-size: 0.72em; color: #555; margin: 2px 0 4px; }
  .cd-leg span { display: inline-flex; align-items: center; gap: 4px; }
  .cd-leg i { width: 10px; height: 3px; border-radius: 2px; display: inline-block; }
  .past-card .pc-fate { display: inline-block; font-size: 0.74em; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .pc-fate.died { background: #f0e0e0; color: #78281f; }
  .pc-fate.transferred { background: #e3e8f0; color: #1a3a5a; }
  .pc-fate.merged { background: #e2efe0; color: #2d5a1e; }
  .pc-fate.removed { background: #ececec; color: #555; }
  .past-card.has-thumb { display: grid; grid-template-columns: 84px 1fr; gap: 12px; align-items: start; }
  .past-card.has-thumb .pc-fate { grid-column: 1 / -1; }
  .past-card .pc-thumb { position: relative; }
  .past-card .pc-thumb img { width: 84px; height: 84px; object-fit: cover; border-radius: 8px; cursor: pointer; background: #eee; }
  .past-card .pc-nph { position: absolute; bottom: 3px; right: 3px; font-size: 0.62em; background: #000a; color: #fff; padding: 1px 5px; border-radius: 8px; }
  .past-card .pc-name { font-style: italic; font-weight: 600; font-size: 0.95em; margin: 6px 0 4px; }
  .past-card .pc-meta { font-size: 0.76em; color: #666; line-height: 1.5; }
  #origin-panel { display: none; position: absolute; top: 110%; left: 0; z-index: 50; background: #fff; border: 1px solid #ccc; border-radius: 8px; box-shadow: 0 4px 14px rgba(0,0,0,.18); padding: 8px; max-height: 320px; overflow-y: auto; min-width: 230px; }
  #origin-panel.open { display: block; }
  #origin-panel label { display: flex; align-items: center; gap: 7px; font-size: 0.8em; padding: 4px 5px; cursor: pointer; white-space: nowrap; border-radius: 5px; }
  #origin-panel label:hover { background: #f0ede8; }
  #origin-panel .op-actions { display: flex; gap: 8px; border-top: 1px solid #eee; margin-top: 6px; padding-top: 6px; }
  #origin-panel .op-actions a { font-size: 0.75em; color: #2d4a1e; cursor: pointer; }
  .fbtn.has-sel { background: #2d4a1e; border-color: #2d4a1e; color: #fff; }
  .img-wrap img { cursor: zoom-in; }
  .cover-btn { position: absolute; top: 6px; left: 6px; width: 30px; height: 30px; border-radius: 50%; border: none; background: rgba(0,0,0,.4); color: #fff; font-size: 1em; line-height: 1; cursor: pointer; opacity: .55; transition: opacity .15s, background .15s; }
  .cover-btn:hover { opacity: 1; background: rgba(0,0,0,.65); }
  .cover-btn.is-cover { background: #f0b400; color: #fff; opacity: 1; }
  #lightbox { display: none; position: fixed; z-index: 1000; inset: 0; background: rgba(0,0,0,.88); overflow: auto; text-align: center; }
  #lightbox.open { display: block; }
  #lightbox img { cursor: zoom-in; }
  #lightbox img.fit { max-width: 96vw; max-height: 92vh; margin: 4vh auto 0; cursor: zoom-in; }
  #lightbox img.full { max-width: none; max-height: none; margin: 0; cursor: zoom-out; }
  #lb-caption { position: fixed; bottom: 0; left: 0; right: 0; color: #fff; font-size: 0.85em; padding: 8px; background: rgba(0,0,0,.5); }
  #lb-close { position: fixed; top: 10px; right: 14px; color: #fff; font-size: 1.6em; background: none; border: none; cursor: pointer; }
</style>

<style>
[data-tab="past"]{display:none!important}

#origin-wrap{display:none!important}

<body>
<h1>Orchid Collection</h1>
<div class="subtitle">A private orchid collection in Nairobi, Kenya &middot; 311 plants &middot; hobby grower</div>
<div id="tabs">
  <button class="tab active" data-tab="collection" onclick="showTab('collection')">Collection</button>
  <button class="tab" data-tab="locations" onclick="showTab('locations')">Growing areas</button>
  <button class="tab" data-tab="past" onclick="showTab('past')">Past plants</button>
</div>
<div id="tab-collection">
<div id="filters">
  <div class="filter-group" id="fg-group"><span class="filter-label">Group</span></div>
  <div class="filter-group" id="fg-loc"><span class="filter-label">Location</span></div>
  <div class="filter-group" id="fg-health"><span class="filter-label">Health</span></div>
  <div class="filter-group">
    <span class="filter-label">Photos</span><span id="fg-photo" style="display:contents"></span>
    <span class="filter-label" style="margin-left:14px">Label</span><span id="fg-label" style="display:contents"></span>
    <span class="filter-label" style="margin-left:14px">Dupes</span><span id="fg-dup" style="display:contents"></span>
  </div>
  <div class="filter-group">
    <span class="filter-label">Sort</span>
    <select id="fsort">
      <option value="uid">UID #</option>
      <option value="name">Name A–Z</option>
      <option value="location">Location</option>
      <option value="acquired">Date acquired (newest)</option>
      <option value="acquired_old">Date acquired (oldest)</option>
    </select>
    <input id="search" placeholder="search name…" style="width:200px"/>
    <div id="origin-wrap" style="position:relative">
      <button class="fbtn" id="origin-btn" onclick="toggleOrigin(event)">Origin &#9662;</button>
      <div id="origin-panel"></div>
    </div>
    <button class="fbtn" style="margin-left:auto" onclick="exportCovers()" title="Copy your cover-photo choices to send to Claude">\u2605 Export covers</button>
  </div>
</div>
<div id="count"></div>
<div class="grid" id="grid"></div>
</div>
<div id="tab-locations" style="display:none"><div class="grid" id="loc-grid"></div></div>
<div id="tab-past" style="display:none">
  <div id="past-filters">
    <div class="filter-group">
      <span class="filter-label">Show</span>
      <button class="fbtn active" data-pkind="" onclick="setPastKind(this,'')">All</button>
      <button class="fbtn" data-pkind="Died" onclick="setPastKind(this,'Died')">Died</button>
      <button class="fbtn" data-pkind="Transferred" onclick="setPastKind(this,'Transferred')">Transferred</button>
      <button class="fbtn" data-pkind="Merged" onclick="setPastKind(this,'Merged')">Merged (alive)</button>
      <button class="fbtn" data-pkind="Removed" onclick="setPastKind(this,'Removed')">Removed / duplicate</button>
    </div>
    <div class="filter-group">
      <span class="filter-label">Sort</span>
      <select id="past-sort" onchange="pastState.sort=this.value;renderPast()">
        <option value="kind">Fate, then name</option>
        <option value="name">Name (A\u2013Z)</option>
        <option value="source">Source</option>
        <option value="ref">Ref / code</option>
      </select>
      <input id="past-search" placeholder="Search past plants\u2026" oninput="pastState.q=this.value.toLowerCase();renderPast()"/>
    </div>
  </div>
  <div id="past-count"></div><div class="grid" id="past-grid"></div>
</div>
<div id="lightbox" onclick="closeLB(event)">
  <button id="lb-close" onclick="forceCloseLB(event)">&#10005;</button>
  <img id="lb-img" class="fit" onclick="toggleZoom(event)"/>
  <div id="lb-caption"></div>
</div>

function coverOf(uid){ return userCovers[uid] || BAKED_COVERS[uid] || null; }
function coverIndex(p){
  var c = coverOf(p.uid);
  if (c){ for (var k=0;k<p.photos.length;k++){ if (p.photos[k].path.indexOf(c) >= 0) return k; } }
  return 0;
}

function esc(t){ return (t==null?"":String(t)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;"); }
function encPath(p){ return p.split("/").map(encodeURIComponent).join("/"); }

function mkButtons(elId, vals, key, allLabel){
  var el = document.getElementById(elId);
  var all = document.createElement("button");
  all.className = "fbtn active"; all.textContent = allLabel || "All";
  all.onclick = function(){ state[key]=""; render(); };
  el.appendChild(all);
  vals.forEach(function(v){
    var b = document.createElement("button");
    b.className = "fbtn"; b.textContent = v; b.dataset.val = v;
    b.onclick = function(){ state[key] = (state[key]===v ? "" : v); render(); };
    el.appendChild(b);
  });
}

function filtered(){
  var q = state.q.toLowerCase();
  var out = PLANTS.filter(function(p){
    if (state.group && p.group !== state.group) return false;
    if (state.health && p.health_bucket !== state.health) return false;
    if (state.loc && p.loc_bucket !== state.loc) return false;
    if (state.photo === "flower" && !p.has_flower) return false;
    if (state.photo === "noflower" && p.has_flower) return false;
    if (state.photo === "none" && p.photos.length) return false;
    if (state.label && p.label_status !== state.label) return false;
    if (state.dup === "dup" && !p.dup) return false;
    if (state.origins.length && state.origins.indexOf(p.source||"(none)") < 0) return false;
    if (q){
      var hay = [p.name, p.common, p.code, "UID"+p.uid, p.uid, p.location, p.notes, p.source]
        .join(" ").toLowerCase();
      if (hay.indexOf(q) < 0) return false;
    }
    return true;
  });
  if (state.sort === "name") out.sort(function(a,b){ return a.name.localeCompare(b.name); });
  else if (state.sort === "location") out.sort(function(a,b){ return (a.location||"zzz").localeCompare(b.location||"zzz") || a.uid-b.uid; });
  else if (state.sort === "acquired") out.sort(function(a,b){ return (b.acquired_key||0)-(a.acquired_key||0) || a.uid-b.uid; });
  else if (state.sort === "acquired_old") out.sort(function(a,b){ var ak=a.acquired_key||999999, bk=b.acquired_key||999999; return ak-bk || a.uid-b.uid; });
  else out.sort(function(a,b){ return a.uid-b.uid; });
  return out;
}

function photoHTML(p){
  if (!p.photos.length) return '<div class="img-wrap"><span class="no-img">\uD83C\uDF3F</span></div>';
  if (photoPos[p.uid] === undefined) photoPos[p.uid] = coverIndex(p);
  var i = photoPos[p.uid] || 0;
  var ph = p.photos[i];
  var nav = "";
  if (p.photos.length > 1){
    nav = '<button class="ph-nav ph-prev" onclick="flip('+p.uid+',-1)">\u2039</button>' +
          '<button class="ph-nav ph-next" onclick="flip('+p.uid+',1)">\u203A</button>';
  }
  var lbcap = esc(p.name)+' \u2014 '+esc(ph.caption)+' '+esc(ph.date||'');
  var fname = ph.path.split('/').pop();
  var isCover = (fname === coverOf(p.uid)) || (coverOf(p.uid)===null && i===0);
  var star = '<button class="cover-btn'+(isCover?' is-cover':'')+'" title="'+
    (isCover?'Cover photo':'Set as cover')+'" onclick="setCover(event,'+p.uid+',\''+
    fname.replace(/'/g,"&#39;")+'\')">\u2605</button>';
  return '<div class="img-wrap"><img loading="lazy" src="'+encPath(ph.path)+'" alt="" '+
    'onload="if(this.naturalHeight>1.25*this.naturalWidth)this.style.objectFit=\'cover\'" '+
    'onclick="openLB(this.src, \''+lbcap.replace(/'/g,"&#39;")+'\', '+p.uid+', \''+fname.replace(/'/g,"&#39;")+'\')"/>'+nav+star+
    '<div class="ph-meta"><span>'+esc(ph.caption)+'</span><span>'+esc(ph.date||"")+
    (p.photos.length>1 ? " \u00B7 "+(i+1)+"/"+p.photos.length : "")+'</span></div></div>';
}

function flip(uid, d){
  var p = PLANTS.find(function(x){ return x.uid===uid; });
  var n = p.photos.length;
  photoPos[uid] = (((photoPos[uid]||0)+d)%n+n)%n;
  render();
}

function row(label, val){ return val ? "<tr><td>"+label+"</td><td>"+esc(val)+"</td></tr>" : ""; }

function cardHTML(p){
  var hb = p.health_bucket;
  var badges = "";
  if (p.temp) badges += '<span class="badge temp">\uD83C\uDF21 '+esc(p.temp)+'</span>';
  if (p.light_fc) badges += '<span class="badge light">\u2600 '+esc(p.light_fc)+' fc</span>';
  else if (p.light) badges += '<span class="badge light">\u2600 '+esc(p.light)+'</span>';
  if (p.health) badges += '<span class="badge h'+(hb||"Other").replace(/[^A-Za-z]/g,"")+'">'+esc(p.health)+'</span>';
  if (p.label_status==="none") badges += '<span class="badge lblNone">No label</span>';
  else if (p.label_status==="replace") badges += '<span class="badge lblRepl">Needs label</span>';
  var loc = p.location ? '<span class="locpill">\uD83D\uDCCD '+esc(p.location)+
    (p.location_dry ? ' \u00B7 rest: '+esc(p.location_dry) : '')+'</span>' : '';
  var det = row("Light", p.light) + row("Light fc", p.light_fc) + row("Temp", p.temp_graph || p.temp) +
    row("Humidity", p.humidity) + row("Air", p.air) + row("Fert", p.fert) +
    row("Watering", p.watering) + row("Pot/Mount", p.pot) + row("Media", p.media) +
    row("Shade", p.shade) + row("Acquired", p.acquired) + row("Repotted", p.repotted) +
    row("Source", p.source) + row("Cost", p.cost) + row("Blooms", p.blooms) +
    row("Diseases", p.diseases) + row("Notes", p.notes);
  return '<div class="card">'+photoHTML(p)+'<div class="info">'+
    '<div class="uidline"><span>UID '+p.uid+(p.code ? ' \u00B7 '+esc(p.code) : '')+'</span><span>'+esc(p.group)+'</span></div>'+
    '<div class="name">'+esc(p.name)+(p.common && p.name.indexOf(p.common)<0 ? ' \u2018'+esc(p.common)+'\u2019' : '')+'</div>'+
    '<div class="badges">'+badges+'</div>'+loc+
    '<details><summary>Details</summary><table>'+det+'</table></details>'+
    '</div></div>';
}

function render(){
  document.querySelectorAll("#fg-group .fbtn").forEach(function(b){
    b.classList.toggle("active", (b.dataset.val||"")===state.group); });
  document.querySelectorAll("#fg-loc .fbtn").forEach(function(b){
    b.classList.toggle("active", (b.dataset.val||"")===state.loc); });
  document.querySelectorAll("#fg-health .fbtn").forEach(function(b){
    b.classList.toggle("active", (b.dataset.val||"")===state.health); });
  document.querySelectorAll("#fg-photo .fbtn").forEach(function(b){
    b.classList.toggle("active", (b.dataset.val||"")===state.photo); });
  document.querySelectorAll("#fg-label .fbtn").forEach(function(b){
    b.classList.toggle("active", (b.dataset.val||"")===state.label); });
  document.querySelectorAll("#fg-dup .fbtn").forEach(function(b){
    b.classList.toggle("active", (b.dataset.val||"")===state.dup); });
  var out = filtered();
  document.getElementById("count").textContent =
    out.length+" of "+PLANTS.length+" plants \u00B7 "+
    out.filter(function(p){return p.photos.length;}).length+" with photos";
  document.getElementById("grid").innerHTML = out.map(cardHTML).join("");
}

function openLB(src, cap, uid, fname){
  var im = document.getElementById("lb-img");
  im.src = src; im.className = "fit";
  var btn = (uid!=null) ? ' \u00B7 <button onclick="setCover(event,'+uid+',\''+
    (fname||'').replace(/'/g,"&#39;")+'\')" style="font-size:.85em;padding:3px 9px;border-radius:6px;'+
    'border:1px solid #fff6;background:#0004;color:#fff;cursor:pointer">\u2605 Set as cover</button>' : '';
  document.getElementById("lb-caption").innerHTML = cap +
    ' \u00B7 <span id="lb-res"></span> \u00B7 click image for 1:1, Esc to close' + btn;
  im.onload = function(){ document.getElementById("lb-res").textContent = im.naturalWidth+"\u00D7"+im.naturalHeight; };
  document.getElementById("lightbox").classList.add("open");
}
function setCover(e, uid, fname){
  e.stopPropagation();
  userCovers[uid] = fname;
  try { localStorage.setItem("orchidCovers", JSON.stringify(userCovers)); } catch(err){}
  var p = PLANTS.find(function(x){ return x.uid===uid; });
  if (p) photoPos[uid] = coverIndex(p);   // jump card to the chosen cover
  render();
}
function exportCovers(){
  var txt = JSON.stringify(userCovers, null, 1);
  navigator.clipboard && navigator.clipboard.writeText(txt);
  alert("Cover choices ("+Object.keys(userCovers).length+") copied to clipboard.\n\n"+
    "Paste them to Claude to save permanently (covers.json), so they survive a rebuild and show on every device.\n\n"+txt);
}
function toggleZoom(e){
  e.stopPropagation();
  var im = document.getElementById("lb-img");
  im.className = (im.className==="fit") ? "full" : "fit";
}
function closeLB(e){
  if (e.target.id === "lightbox") document.getElementById("lightbox").classList.remove("open");
}
function forceCloseLB(e){
  e.stopPropagation();
  document.getElementById("lightbox").classList.remove("open");
}
document.addEventListener("keydown", function(e){
  if (e.key === "Escape") document.getElementById("lightbox").classList.remove("open");
});

// ---- tabs ----
function showTab(t){
  ["collection","locations","past"].forEach(function(x){
    document.getElementById("tab-"+x).style.display = (x===t)?"":"none";
  });
  document.querySelectorAll("#tabs .tab").forEach(function(b){
    b.classList.toggle("active", b.dataset.tab===t);
  });
  if (t==="locations" && !document.getElementById("loc-grid").dataset.built) renderLocations();
  if (t==="past" && !document.getElementById("past-grid").dataset.built) renderPast();
}
function tY(v,top,h){ var lo=8,hi=36; return top+h-(v-lo)/(hi-lo)*h; }
// on-card mini temp strip: faint min-max band + day/night swing bar per month
function tempStrip(M){
  var W=300,H=72,top=4,h=52,n=M.length,step=W/n,x0=step/2,o=[];
  o.push('<rect x="0" y="'+tY(28,top,h)+'" width="'+W+'" height="'+(tY(15,top,h)-tY(28,top,h))+'" fill="#1D9E75" opacity="0.08"/>');
  ["15","20","25","30"].forEach(function(t){var y=tY(+t,top,h);o.push('<text x="1" y="'+(y+3)+'" font-size="8" fill="#b4b2a9">'+t+'</text>');});
  for(var i=0;i<n;i++){var d=M[i],x=x0+i*step;
    if(d.tmin!=null&&d.tmax!=null) o.push('<line x1="'+x+'" y1="'+tY(d.tmin,top,h)+'" x2="'+x+'" y2="'+tY(d.tmax,top,h)+'" stroke="#D85A30" stroke-width="3" stroke-linecap="round" opacity="0.22"/>');
    if(d.tn!=null&&d.td!=null) o.push('<line x1="'+x+'" y1="'+tY(d.tn,top,h)+'" x2="'+x+'" y2="'+tY(d.td,top,h)+'" stroke="#D85A30" stroke-width="6" stroke-linecap="round" opacity="0.55"/>');
    o.push('<text x="'+x+'" y="'+(top+h+13)+'" font-size="8.5" fill="#888780" text-anchor="middle">'+d.m[0]+'</text>');
  }
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" role="img" aria-label="Monthly temperature: min-max band and day-night swing">'+o.join("")+'</svg>';
}
function histChart(D){
  var W=300,H=96,top=6,h=66,hist=D.hist,mx=Math.max.apply(null,hist),bw=W/hist.length,o=[];
  for(var i=0;i<hist.length;i++){var bh=mx?hist[i]/mx*h:0;
    o.push('<rect x="'+(i*bw+1)+'" y="'+(top+h-bh)+'" width="'+(bw-1.5)+'" height="'+bh+'" rx="1" fill="#1D9E75" opacity="0.8"/>');}
  [10,20,30].forEach(function(t){var x=(t-D.binlo)/2*bw;o.push('<line x1="'+x+'" y1="'+top+'" x2="'+x+'" y2="'+(top+h)+'" stroke="#e0ddd5" stroke-width="0.5"/>');o.push('<text x="'+x+'" y="'+(top+h+12)+'" font-size="8.5" fill="#888780" text-anchor="middle">'+t+'\u00B0</text>');});
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" role="img" aria-label="Temperature distribution">'+o.join("")+'</svg>';
}
// ---- interactive monthly chart (toggle temp/humidity, hover tooltip) ----
var CHART={};
function climGeo(mode){
  return {W:320,H:150,padL:24,padR:8,top:10,plotH:104,
          ylo: mode==="humid"?30:8, yhi: mode==="humid"?100:36};
}
function climInner(M,mode,g){
  var n=M.length, plotW=g.W-g.padL-g.padR, o=[];
  function X(i){ return g.padL + (i+0.5)*plotW/n; }
  function Y(v){ return g.top + g.plotH - (v-g.ylo)/(g.yhi-g.ylo)*g.plotH; }
  if(mode==="humid"){
    var bands=[[30,40,"#E24B4A",0.10,"too dry"],[40,50,"#EF9F27",0.12,"low"],[50,75,"#1D9E75",0.13,"ideal 50\u201375%"],[75,85,"#EF9F27",0.12,"high"],[85,100,"#E24B4A",0.12,"saturated"]];
    bands.forEach(function(b){o.push('<rect x="'+g.padL+'" y="'+Y(b[1])+'" width="'+plotW+'" height="'+(Y(b[0])-Y(b[1]))+'" fill="'+b[2]+'" opacity="'+b[3]+'"/>');});
    [40,60,80,100].forEach(function(t){o.push('<text x="'+(g.padL-3)+'" y="'+(Y(t)+3)+'" font-size="8" fill="#b4b2a9" text-anchor="end">'+t+'</text>');});
  } else {
    o.push('<rect x="'+g.padL+'" y="'+Y(28)+'" width="'+plotW+'" height="'+(Y(15)-Y(28))+'" fill="#1D9E75" opacity="0.08"/>');
    [10,15,20,25,30,35].forEach(function(t){var y=Y(t);o.push('<line x1="'+g.padL+'" y1="'+y+'" x2="'+(g.W-g.padR)+'" y2="'+y+'" stroke="#f0eee7" stroke-width="0.5"/>');o.push('<text x="'+(g.padL-3)+'" y="'+(y+3)+'" font-size="8" fill="#b4b2a9" text-anchor="end">'+t+'</text>');});
    var topL=[],botL=[];
    for(var i=0;i<n;i++){if(M[i].tmax!=null)topL.push(X(i)+","+Y(M[i].tmax)); if(M[i].tmin!=null)botL.push(X(i)+","+Y(M[i].tmin));}
    if(topL.length&&botL.length)o.push('<polygon points="'+topL.concat(botL.reverse()).join(" ")+'" fill="#D85A30" opacity="0.10"/>');
  }
  var dayKey=mode==="humid"?"hd":"td", nightKey=mode==="humid"?"hn":"tn";
  var dayCol=mode==="humid"?"#BA7517":"#D85A30", nightCol="#185FA5";
  function line(key,col){var pts=[];for(var i=0;i<n;i++){if(M[i][key]==null)continue;pts.push(X(i)+","+Y(M[i][key]));}
    if(pts.length)o.push('<polyline points="'+pts.join(" ")+'" fill="none" stroke="'+col+'" stroke-width="1.6"/>');
    for(var j=0;j<n;j++){if(M[j][key]==null)continue;o.push('<circle cx="'+X(j)+'" cy="'+Y(M[j][key])+'" r="2" fill="'+col+'"/>');}}
  line(dayKey,dayCol); line(nightKey,nightCol);
  for(var i=0;i<n;i++)o.push('<text x="'+X(i)+'" y="'+(g.top+g.plotH+13)+'" font-size="8.5" fill="#888780" text-anchor="middle">'+M[i].m[0]+'</text>');
  o.push('<line id="" class="climguide" x1="-9" y1="'+g.top+'" x2="-9" y2="'+(g.top+g.plotH)+'" stroke="#888780" stroke-width="0.7" opacity="0"/>');
  return o.join("");
}
function setClimateMode(idx,mode){
  var st=CHART[idx]; st.mode=mode; st.geo=climGeo(mode);
  var svg=document.getElementById("climsvg-"+idx); svg.innerHTML=climInner(st.M,mode,st.geo);
  document.querySelectorAll("#climtog-"+idx+" .cd-chip").forEach(function(b){b.classList.toggle("on", b.dataset.m===mode);});
  document.getElementById("climleg-"+idx).innerHTML = mode==="humid"
    ? '<span><i style="background:#BA7517"></i>day</span><span><i style="background:#185FA5"></i>night</span><span style="color:#888">bands = orchid RH zones (green 50\u201375% ideal)</span>'
    : '<span><i style="background:#D85A30"></i>day mean</span><span><i style="background:#185FA5"></i>night mean</span><span style="color:#888">shaded = month min\u2013max</span>';
}
function climHover(idx,evt){
  var st=CHART[idx],g=st.geo,M=st.M,n=M.length,svg=evt.currentTarget;
  var rw=svg.getBoundingClientRect().width||g.W, sx=evt.offsetX/rw*g.W;
  var plotW=g.W-g.padL-g.padR, i=Math.floor((sx-g.padL)/plotW*n); if(i<0)i=0; if(i>=n)i=n-1;
  var X=g.padL+(i+0.5)*plotW/n, gd=svg.querySelector(".climguide");
  if(gd){gd.setAttribute("x1",X);gd.setAttribute("x2",X);gd.setAttribute("opacity","0.5");}
  var d=M[i], tip=document.getElementById("climtip-"+idx), html;
  if(st.mode==="humid") html='<b>'+d.m+'</b> &nbsp;day '+(d.hd!=null?d.hd+'%':'\u2013')+' &nbsp;night '+(d.hn!=null?d.hn+'%':'\u2013');
  else html='<b>'+d.m+'</b> &nbsp;day '+(d.td!=null?d.td+'\u00B0':'\u2013')+' &nbsp;night '+(d.tn!=null?d.tn+'\u00B0':'\u2013')+' &nbsp;<span style="color:#888">'+d.tmin+'\u2013'+d.tmax+'\u00B0</span>';
  tip.innerHTML=html; tip.style.display="block";
  tip.style.left=Math.min(Math.max(evt.offsetX/rw*svg.clientWidth,4),svg.clientWidth-150)+"px";
}
function climHide(idx){var t=document.getElementById("climtip-"+idx);if(t)t.style.display="none";
  var svg=document.getElementById("climsvg-"+idx);if(svg){var gd=svg.querySelector(".climguide");if(gd)gd.setAttribute("opacity","0");}}
function climateDetail(a,idx){
  CHART[idx]={M:a.climate.monthly, mode:"temp", geo:climGeo("temp")};
  var c=a.climate, o='';
  o+='<div id="climtog-'+idx+'" class="cd-tog"><span class="cd-chip on" data-m="temp" onclick="setClimateMode('+idx+',\'temp\')">Temperature</span>'+
     '<span class="cd-chip" data-m="humid" onclick="setClimateMode('+idx+',\'humid\')">Humidity</span></div>'+
     '<div class="cd-chartwrap"><div id="climtip-'+idx+'" class="cd-tip"></div>'+
     '<svg id="climsvg-'+idx+'" viewBox="0 0 320 150" width="100%" onmousemove="climHover('+idx+',event)" onmouseleave="climHide('+idx+')" role="img" aria-label="Monthly day/night climate chart"></svg></div>'+
     '<div id="climleg-'+idx+'" class="cd-leg"></div>';
  if(c.dist){ var d=c.dist;
    o+='<div class="cd-h">Temperature distribution \u2014 all '+d.n.toLocaleString()+' readings</div>'+histChart(d)+
       '<div class="cd-note">p10 '+d.tp10+'\u00B0 \u00B7 median <b>'+d.tp50+'\u00B0</b> \u00B7 p90 '+d.tp90+'\u00B0C'+
       (d.hp50!=null?'  |  RH median '+d.hp50+'% ('+d.hp10+'\u2013'+d.hp90+')':'')+'</div>';
  }
  return '<div class="cd-panel">'+o+'</div>';
}
function lightCat(lo,hi){
  // rough orchid light category from the spot range midpoint (AOS fc guide)
  var mid=(lo+hi)/2;
  if (mid < 1200) return "low / shade";
  if (mid < 2500) return "medium";
  return "bright / high";
}
function renderLocations(){
  AREAS.sort(function(a,b){ return b.count-a.count || a.name.localeCompare(b.name); });
  var html = AREAS.map(function(a,idx){
    // climate stat chips (temp mean/night + humidity)
    var stats="";
    if (a.climate){ var c=a.climate;
      stats += '<span class="stat">\uD83C\uDF21 day mean <b>'+c.tmean+'\u00B0</b> \u00B7 night <b>'+c.night+'\u00B0</b></span>';
      if (c.hmean!=null) stats += '<span class="stat">\uD83D\uDCA7 humidity <b>'+c.hmean+'%</b></span>';
    }
    var statHtml = stats ? '<div class="lc-stats">'+stats+'</div>' : '';
    // light block: list each measured spot in the area (fc)
    var lightHtml;
    if (a.light){
      var lo=a.light.min, hi=a.light.max, cat=lightCat(lo,hi);
      var hdr = '<div class="lc-strip-lbl">\u2600 Light \u2014 typical midday <b>'+lo+'\u2013'+hi+' fc</b> '+
                '<span class="lc-lcat">'+cat+'</span> \u00B7 '+a.light.n+' spot'+(a.light.n===1?"":"s")+'</div>';
      var rows = a.light.spots.map(function(s){
        return '<div class="lc-lspot" title="median of '+s.reads+' midday readings"><span>'+esc(s.spot)+'</span><b>'+s.min+'\u2013'+s.max+' fc</b></div>';
      }).join("");
      lightHtml = hdr + '<div class="lc-light">'+rows+'</div>';
    } else {
      lightHtml = '<div class="lc-light-none">\u2600 No light readings logged for this area yet.</div>';
    }
    // temperature strip (logged zones only)
    var tempHtml="";
    if (a.climate && a.climate.monthly){
      tempHtml = '<div class="lc-strip-lbl">Temp \u00B0C \u2014 monthly (night\u2192day swing)</div>'+tempStrip(a.climate.monthly);
    }
    var chip = (a.climate && a.climate.dist) ?
      '<span class="cd-chip" onclick="toggleClimate('+idx+',event)">temp &amp; humidity detail \u203A</span>' : '';
    var jump = a.count>0 ?
      '<span class="lc-link" onclick="jumpToLocation(\''+a.name.replace(/'/g,"&#39;")+'\')">View these plants \u2192</span>' :
      '<span class="lc-link lc-link-off">No orchids here yet</span>';
    return '<div class="loc-card'+(a.count===0?" loc-empty":"")+'"><h3>'+esc(a.name)+'</h3>'+
      '<div class="lc-count">'+a.count+' plant'+(a.count===1?"":"s")+'</div>'+
      (a.desc?'<div class="lc-desc">'+esc(a.desc)+'</div>':'')+
      lightHtml+
      statHtml+
      tempHtml+
      '<div class="lc-actions">'+jump+chip+'</div>'+
      '<div id="cd-'+idx+'" style="display:none"></div></div>';
  }).join("");
  var g=document.getElementById("loc-grid"); g.innerHTML=html; g.dataset.built="1";
}
function toggleClimate(idx,e){
  e.stopPropagation();
  var el=document.getElementById("cd-"+idx);
  if(el.dataset.open){ el.style.display="none"; el.dataset.open=""; return; }
  if(!el.innerHTML){ el.innerHTML=climateDetail(AREAS[idx],idx); setClimateMode(idx,"temp"); }
  el.style.display=""; el.dataset.open="1";
}
function jumpToLocation(name){
  // switch to Collection tab, filtered by exact location via search
  showTab("collection");
  document.querySelectorAll("#tabs .tab").forEach(function(b){ b.classList.toggle("active", b.dataset.tab==="collection"); });
  state.loc=""; state.group=""; state.health=""; state.photo=""; state.label=""; state.dup=""; state.origins=[];
  state.q = name.toLowerCase();
  document.getElementById("search").value = name;
  render();
}
var pastState={ q:"", kind:"", sort:"kind" };
var PAST_KINDS={ "Died":"died", "Transferred":"transferred", "Merged":"merged", "Removed":"removed" };
function setPastKind(btn,k){
  pastState.kind=k;
  btn.parentNode.querySelectorAll(".fbtn").forEach(function(b){ b.classList.toggle("active", b===btn); });
  renderPast();
}
function renderPast(){
  var order={ "Died":0, "Transferred":1, "Merged":2, "Removed":3 };
  var q=pastState.q;
  var list=PAST.filter(function(p){
    if (pastState.kind && p.kind!==pastState.kind) return false;
    if (!q) return true;
    var hay=[p.name,p.ref,p.source,p.fate,p.notes,p.acquired].join(" ").toLowerCase();
    return hay.indexOf(q)>=0;
  });
  list.sort(function(a,b){
    if (pastState.sort==="name") return a.name.localeCompare(b.name);
    if (pastState.sort==="source") return (a.source||"").localeCompare(b.source||"") || a.name.localeCompare(b.name);
    if (pastState.sort==="ref") return (a.ref||"").localeCompare(b.ref||"", undefined, {numeric:true}) || a.name.localeCompare(b.name);
    return (order[a.kind]-order[b.kind]) || a.name.localeCompare(b.name);
  });
  function nk(k){ return PAST.filter(function(p){return p.kind===k;}).length; }
  var parts=[]; ["Died","Transferred","Merged","Removed"].forEach(function(k){
    var c=nk(k); if(c) parts.push(c+" "+k.toLowerCase());
  });
  var shown=list.length, total=PAST.length;
  document.getElementById("past-count").textContent =
    (shown===total ? total+" past plants" : shown+" of "+total+" past plants")+
    " \u00B7 "+parts.join(", ");
  if (!list.length){ document.getElementById("past-grid").innerHTML='<div class="empty">No past plants match.</div>'; return; }
  var html = list.map(function(p){
    var cls = PAST_KINDS[p.kind]||"died";
    var meta = [];
    if (p.ref) meta.push("ref "+esc(p.ref));
    if (p.acquired) meta.push("acquired "+esc(p.acquired));
    if (p.source) meta.push("from "+esc(p.source));
    if (p.fate) meta.push("<b>"+esc(p.fate)+"</b>");
    var thumb="";
    if (p.photos && p.photos.length){
      var ph=p.photos[0];
      var cap=esc(p.name)+' \u2014 '+esc(ph.caption||'')+' '+esc(ph.date||'');
      thumb='<div class="pc-thumb"><img loading="lazy" src="'+encPath(ph.path)+'" alt="" '+
        'onclick="openLB(this.src,\''+cap.replace(/'/g,"&#39;")+'\',null,null)"/>'+
        (p.photos.length>1?'<span class="pc-nph">'+p.photos.length+' photos</span>':'')+'</div>';
    }
    return '<div class="past-card '+(thumb?"has-thumb":"")+'"><span class="pc-fate '+cls+'">'+esc(p.kind)+'</span>'+
      thumb+
      '<div class="pc-body"><div class="pc-name">'+esc(p.name)+'</div>'+
      '<div class="pc-meta">'+meta.join(" \u00B7 ")+
      (p.notes?'<br>'+esc(p.notes.slice(0,160)):'')+'</div></div></div>';
  }).join("");
  var g=document.getElementById("past-grid"); g.innerHTML=html; g.dataset.built="1";
}

// ---- Origin multi-select ----
(function(){
  var panel = document.getElementById("origin-panel");
  ORIGINS.forEach(function(o){
    var lab = document.createElement("label");
    var cb = document.createElement("input");
    cb.type="checkbox"; cb.value=o;
    cb.onchange = function(){
      if (cb.checked) state.origins.push(o);
      else state.origins = state.origins.filter(function(x){return x!==o;});
      updateOriginBtn(); render();
    };
    lab.appendChild(cb); lab.appendChild(document.createTextNode(" "+o));
    panel.appendChild(lab);
  });
  var act = document.createElement("div"); act.className="op-actions";
  var clr = document.createElement("a"); clr.textContent="Clear";
  clr.onclick=function(){ state.origins=[];
    panel.querySelectorAll("input").forEach(function(c){c.checked=false;});
    updateOriginBtn(); render(); };
  act.appendChild(clr); panel.appendChild(act);
})();
function updateOriginBtn(){
  var b=document.getElementById("origin-btn");
  b.textContent = state.origins.length ? "Origin ("+state.origins.length+") \u25be" : "Origin \u25be";
  b.classList.toggle("has-sel", state.origins.length>0);
}
function toggleOrigin(e){ e.stopPropagation(); document.getElementById("origin-panel").classList.toggle("open"); }
document.addEventListener("click", function(e){
  var w=document.getElementById("origin-wrap");
  if (w && !w.contains(e.target)) document.getElementById("origin-panel").classList.remove("open");
});
render();
</script>
